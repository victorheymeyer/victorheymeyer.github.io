<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist Jobs</title>
<link rel="stylesheet" href="/styles.css">
<script defer src="/site.js"></script>
</head>
<body>
<div id="siteNav"></div>
<div class="wrap">
  <h1>Watchlist Jobs (Global)</h1>
  <div class="sub" id="sub">Loading the latest snapshot...</div>

  <div id="errBox"></div>

  <div class="cards" id="cards"></div>

  <div class="panel" id="listPanel" style="display:none">
    <div class="controls">
      <input type="text" id="search" placeholder="Search title, company, or location">
      <select id="companySel"><option value="">All companies</option></select>
      <div class="msdd" id="disciplineDD"></div>
      <div class="msdd" id="roleDD"></div>
      <div class="msdd" id="levelDD"></div>
      <label class="chk"><input type="checkbox" id="waChk"> WA Jobs</label>
      <label class="chk"><input type="checkbox" id="remChk"> Remote-WA Jobs</label>
      <button class="clearbtn" id="clearBtn">Clear</button>
    </div>
    <div id="count" class="hint"></div>
    <table>
      <thead>
        <tr><th style="width:140px">Company</th><th>Title</th><th style="width:200px">Location</th><th style="width:90px" title="Based on first posted date (ATS ID)">Days old</th><th style="width:70px">Link</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="pager" id="pager"></div>
  </div>

  <div class="loading" id="loading">Connecting to Supabase...</div>

  <footer class="site-footer">
    <p>© 2026 Victor Heymeyer | Seattle, WA |<a href="https://www.linkedin.com/in/heymeyer/" target="_blank" rel="noopener noreferrer"> LinkedIn</a> </p>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---- Config ----
const SUPABASE_URL = "https://gfwzdluwljtcbvmmkktd.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmd3pkbHV3bGp0Y2J2bW1ra3RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODA2MjcsImV4cCI6MjA5ODI1NjYyN30.bGjryWzUobX--FFFmBPlEorY8Tb9qpm_aGDEW0ApBps";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, ANON_KEY);

const LIST_COLUMNS = [
  "snapshot_date","watchlist_company","ats_id","title","location",
  "posted_at","url","apply_url","maybe_wa","maybe_remote_wa",
  "discipline","role_keyword","level"
].join(",");

const state = {
  rows: [],
  snapshotDate: null,
  filters: { company: "", wa: false, remote: false, search: "", discipline: [], role: [], level: [] },
  page: 1,
  pageSize: 10
};

// ---- Helpers ----
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function showError(msg) {
  document.getElementById("errBox").innerHTML =
    '<div class="err"><strong>Could not load data.</strong><br>' + msg +
    '<br><br>If this is a permissions error, remember both the RLS <code>select</code> policy for <code>anon</code> AND the table <code>GRANT</code> are needed for reads.</div>';
}

async function fetchAllRows(table, selectCols, applyFilters) {
  // Requested page size. Supabase caps rows-per-request server-side
  // (Project Settings > API > Max Rows, default 1000) and silently clamps
  // anything larger than that cap, so we detect the REAL per-request size
  // from what the first response actually contains rather than assuming
  // this number was honored. That keeps pagination correct whether or not
  // the server-side cap has been raised to match.
  const requestedPageSize = 10000;
  function buildQuery(withCount) {
    let q = supabaseClient.from(table).select(selectCols, withCount ? { count: "exact" } : undefined);
    if (applyFilters) q = applyFilters(q);
    return q;
  }

  // First page tells us the exact total row count and the real per-request
  // cap, so we know how many more pages exist and can fire them all in
  // parallel instead of paging one sequential round trip at a time.
  const first = await buildQuery(true).range(0, requestedPageSize - 1);
  if (first.error) throw first.error;
  let all = first.data || [];
  const total = first.count != null ? first.count : all.length;
  const actualPageSize = all.length > 0 ? all.length : requestedPageSize;

  if (all.length < total) {
    const requests = [];
    for (let from = all.length; from < total; from += actualPageSize) {
      requests.push(buildQuery(false).range(from, from + actualPageSize - 1));
    }
    const results = await Promise.all(requests);
    for (const r of results) {
      if (r.error) throw r.error;
      all = all.concat(r.data || []);
    }
  }
  return all;
}

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toISOString().slice(0, 10);
}

// Days since posted_at (the source's claim). Returns null when posted_at is absent or unparseable.
function daysOld(posted) {
  if (!posted) return null;
  const d = new Date(posted);
  if (isNaN(d)) return null;
  const ms = Date.now() - d.getTime();
  if (ms < 0) return 0;
  return Math.floor(ms / 86400000);
}

// ---- Data load ----
async function init() {
  try {
    // latest snapshot date. Queried against raw_watchlist_jobs (not the
    // jobs_location_flags view) so idx_raw_watchlist_jobs_snapshot_date
    // makes this an index scan instead of a full join expansion.
    const { data: latest, error: e1 } = await supabaseClient.from("raw_watchlist_jobs").select("snapshot_date")
      .order("snapshot_date", { ascending: false }).limit(1);
    if (e1) throw e1;
    if (!latest || !latest.length) { showError("No rows found in raw_watchlist_jobs."); return; }
    state.snapshotDate = latest[0].snapshot_date;

    // all rows for the latest snapshot. No server-side order here: the table
    // has no sort-friendly index for it and the rows get re-sorted client-side
    // by days-old in renderTable() anyway, so a server sort is wasted work.
    state.rows = await fetchAllRows("jobs_location_flags", LIST_COLUMNS, (q) =>
      q.eq("snapshot_date", state.snapshotDate)
    );

    document.getElementById("loading").style.display = "none";
    render();
  } catch (err) {
    document.getElementById("loading").style.display = "none";
    showError((err && err.message) ? err.message : String(err));
    console.error(err);
  }
}

// ---- Render ----
function render() {
  document.getElementById("sub").textContent =
    "Snapshot " + fmtDate(state.snapshotDate) + " | " + state.rows.length.toLocaleString() + " open roles across " +
    new Set(state.rows.map(r => r.watchlist_company)).size + " companies";

  // cards
  const wa = state.rows.filter(r => r.maybe_wa).length;
  const rem = state.rows.filter(r => r.maybe_remote_wa).length;
  document.getElementById("cards").innerHTML =
    card(state.rows.length, "Open roles") +
    card(new Set(state.rows.map(r => r.watchlist_company)).size, "Companies") +
    card(wa, "WA Jobs") +
    card(rem, "Remote-WA Jobs");

  // company dropdown
  const sel = document.getElementById("companySel");
  const companies = Array.from(new Set(state.rows.map(r => r.watchlist_company))).sort();
  sel.innerHTML = '<option value="">All companies</option>' +
    companies.map(c => '<option value="' + c + '">' + c + '</option>').join("");

  // classifier multi-selects (OR within a dropdown, AND across dropdowns; "(unclassified)" matches nulls)
  buildMultiSelect("disciplineDD", "discipline", "discipline", "All disciplines");
  buildMultiSelect("roleDD", "role_keyword", "role", "All roles");
  buildMultiSelect("levelDD", "level", "level", "All levels");

  document.getElementById("listPanel").style.display = "block";

  renderTable();
  wireControls();
}

function card(n, l) {
  return '<div class="card"><div class="n">' + Number(n).toLocaleString() + '</div><div class="l">' + l + '</div></div>';
}

const UNCLASSIFIED = "__unclassified__";
// Build a checkbox dropdown. dataField = row property, filterKey = state.filters key.
function buildMultiSelect(containerId, dataField, filterKey, allLabel) {
  const values = Array.from(new Set(state.rows.map(r => r[dataField]).filter(v => v != null && v !== ""))).sort();
  const hasNull = state.rows.some(r => r[dataField] == null || r[dataField] === "");
  const container = document.getElementById(containerId);
  container.innerHTML =
    '<button type="button" class="msdd-btn"></button>' +
    '<div class="msdd-panel" hidden>' +
      values.map(v => '<label class="msdd-opt"><input type="checkbox" value="' + esc(v) + '"> ' + esc(v) + '</label>').join("") +
      (hasNull ? '<label class="msdd-opt"><input type="checkbox" value="' + UNCLASSIFIED + '"> (unclassified)</label>' : "") +
    '</div>';
  const btn = container.querySelector(".msdd-btn");
  const panel = container.querySelector(".msdd-panel");
  const shortLabel = allLabel.replace(/^All /, "");

  function updateLabel() {
    const n = state.filters[filterKey].length;
    btn.textContent = (n === 0 ? allLabel : shortLabel + " (" + n + ")") + " \u25be";
    btn.classList.toggle("active", n > 0);
  }
  updateLabel();

  btn.onclick = (e) => {
    e.stopPropagation();
    document.querySelectorAll(".msdd-panel").forEach(p => { if (p !== panel) p.hidden = true; });
    panel.hidden = !panel.hidden;
  };
  panel.onclick = (e) => e.stopPropagation();
  panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.onchange = () => {
      const arr = state.filters[filterKey];
      const i = arr.indexOf(cb.value);
      if (cb.checked && i < 0) arr.push(cb.value);
      if (!cb.checked && i >= 0) arr.splice(i, 1);
      state.page = 1;
      updateLabel();
      renderTable();
    };
  });
  container._reset = () => {
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; });
    updateLabel();
  };
}

function classifierMatch(selected, value) {
  if (!selected || selected.length === 0) return true;
  const isNull = (value == null || value === "");
  return selected.some(sel => sel === UNCLASSIFIED ? isNull : sel === value);
}

function applyFilters() {
  const f = state.filters;
  const q = f.search.trim().toLowerCase();
  return state.rows.filter(r => {
    if (f.company && r.watchlist_company !== f.company) return false;
    if (!classifierMatch(f.discipline, r.discipline)) return false;
    if (!classifierMatch(f.role, r.role_keyword)) return false;
    if (!classifierMatch(f.level, r.level)) return false;
    if (f.wa || f.remote) {
      const ok = (f.wa && r.maybe_wa) || (f.remote && r.maybe_remote_wa);
      if (!ok) return false;
    }
    if (q) {
      const hay = ((r.title || "") + " " + (r.watchlist_company || "") + " " + (r.location || "")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderTable() {
  const filtered = applyFilters();
  filtered.sort((a, b) => {
    const da = daysOld(a.posted_at), db = daysOld(b.posted_at);
    if (da == null && db == null) return 0;
    if (da == null) return 1;
    if (db == null) return -1;
    return da - db;
  });
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / state.pageSize));
  if (state.page > pages) state.page = pages;
  const start = (state.page - 1) * state.pageSize;
  const slice = filtered.slice(start, start + state.pageSize);

  document.getElementById("count").textContent =
    total.toLocaleString() + " role" + (total === 1 ? "" : "s") + " matched" +
    (total ? (" (showing " + (start + 1) + " to " + Math.min(start + state.pageSize, total) + ")") : "");

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  slice.forEach(r => {
    const link = r.apply_url || r.url;
    const badges =
      (r.maybe_wa ? '<span class="badge wa">WA</span>' : "") +
      (r.maybe_remote_wa ? '<span class="badge rem">Remote</span>' : "");
    const dOld = daysOld(r.posted_at);
    const tr = document.createElement("tr");
    tr.innerHTML =
      '<td class="company">' + esc(r.watchlist_company) + '</td>' +
      '<td title="' + esc(r.title || "") + '">' + esc(r.title || "(no title)") + badges + '</td>' +
      '<td class="loc" title="' + esc(r.location || "") + '">' + esc(r.location || "") + '</td>' +
      '<td class="loc">' + (dOld == null ? "-" : dOld) + '</td>' +
      '<td>' + (link ? '<a href="' + esc(link) + '" target="_blank" rel="noopener">view</a>' : "") + '</td>';
    tbody.appendChild(tr);
  });

  renderPager(total, pages);
}

function goToPage(n, pages) {
  if (isNaN(n)) return;
  state.page = Math.min(Math.max(1, Math.floor(n)), pages);
  renderTable();
}

function renderPager(total, pages) {
  const p = document.getElementById("pager");
  p.innerHTML = "";
  if (total === 0) return;

  function btn(text, disabled, onclick) {
    const b = document.createElement("button");
    b.textContent = text; b.disabled = disabled; b.onclick = onclick;
    return b;
  }

  const first = btn("First", state.page <= 1, () => goToPage(1, pages));
  const prev = btn("Prev", state.page <= 1, () => goToPage(state.page - 1, pages));
  const next = btn("Next", state.page >= pages, () => goToPage(state.page + 1, pages));
  const last = btn("Last", state.page >= pages, () => goToPage(pages, pages));

  const jump = document.createElement("span");
  jump.className = "jump";
  jump.appendChild(document.createTextNode("Page "));
  const input = document.createElement("input");
  input.type = "number"; input.min = 1; input.max = pages; input.value = state.page;
  input.onchange = () => goToPage(Number(input.value), pages);
  input.onkeydown = (e) => { if (e.key === "Enter") goToPage(Number(input.value), pages); };
  jump.appendChild(input);
  jump.appendChild(document.createTextNode(" of " + pages));

  p.appendChild(first);
  p.appendChild(prev);
  p.appendChild(jump);
  p.appendChild(next);
  p.appendChild(last);
}

function wireControls() {
  const search = document.getElementById("search");
  search.oninput = () => { state.filters.search = search.value; state.page = 1; renderTable(); };
  const sel = document.getElementById("companySel");
  sel.onchange = () => { state.filters.company = sel.value; state.page = 1; renderTable(); };
  document.getElementById("waChk").onchange = (e) => { state.filters.wa = e.target.checked; state.page = 1; renderTable(); };
  document.getElementById("remChk").onchange = (e) => { state.filters.remote = e.target.checked; state.page = 1; renderTable(); };
  document.getElementById("clearBtn").onclick = () => {
    state.filters = { company: "", wa: false, remote: false, search: "", discipline: [], role: [], level: [] };
    state.page = 1;
    search.value = ""; sel.value = "";
    document.getElementById("waChk").checked = false;
    document.getElementById("remChk").checked = false;
    ["disciplineDD", "roleDD", "levelDD"].forEach(id => { const c = document.getElementById(id); if (c && c._reset) c._reset(); });
    renderTable();
  };
  // close any open dropdown when clicking elsewhere
  document.addEventListener("click", () => {
    document.querySelectorAll(".msdd-panel").forEach(p => { p.hidden = true; });
  });
}

init();
</script>
</body>
</html>
