<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats</title>
<link rel="stylesheet" href="/styles.css">
<script defer src="/site.js"></script>
</head>
<body>
<div id="siteNav"></div>
<div class="wrap">
  <h1>Stats</h1>
  <div class="sub">Dashboards and reference data for the watchlist jobs project.</div>

  <div id="errBox"></div>

  <div id="sections"></div>

  <footer class="site-footer">
    <p>© 2026 Victor Heymeyer | Seattle, WA |<a href="https://www.linkedin.com/in/heymeyer/" target="_blank" rel="noopener noreferrer"> LinkedIn</a> </p>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---- Config ----
const SUPABASE_URL = "https://gfwzdluwljtcbvmmkktd.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmd3pkbHV3bGp0Y2J2bW1ra3RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODA2MjcsImV4cCI6MjA5ODI1NjYyN30.bGjryWzUobX--FFFmBPlEorY8Tb9qpm_aGDEW0ApBps";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, ANON_KEY);

// One entry per page in this stats/ folder. Add a new entry (title, href,
// desc, and a load() that returns [{label, value}, ...]) when a new
// stats subpage is added; the section renders itself from that.
const SECTIONS = [
  {
    title: "Top Employers (WA)",
    href: "top_employers.html",
    desc: "Top 50 companies by number of open Washington-based postings on the latest fetch day.",
    load: async () => {
      // Queried against raw_watchlist_jobs (not the jobs_location_flags view)
      // so idx_raw_watchlist_jobs_snapshot_date makes this an index scan
      // instead of forcing a full join expansion.
      const { data: latest, error: e1 } = await supabaseClient
        .from("raw_watchlist_jobs").select("snapshot_date")
        .order("snapshot_date", { ascending: false }).limit(1);
      if (e1) throw e1;
      if (!latest || !latest.length) return [{ label: "WA postings", value: 0 }];
      const snapshotDate = latest[0].snapshot_date;

      const { data, error } = await supabaseClient
        .from("jobs_location_flags")
        .select("watchlist_company")
        .eq("snapshot_date", snapshotDate)
        .eq("maybe_wa", true)
        .limit(10000);
      if (error) throw error;
      const rows = data || [];
      const companies = new Set(rows.map(r => r.watchlist_company));
      return [
        { label: "WA postings", value: rows.length },
        { label: "Companies", value: companies.size },
      ];
    }
  },
  {
    title: "Watchlist Companies",
    href: "watchlist.html",
    desc: "Every company on the watchlist, its ATS, slug, and active status.",
    load: async () => {
      const { data, error } = await supabaseClient
        .from("watchlist_companies")
        .select("ats,active");
      if (error) throw error;
      const rows = data || [];
      const active = rows.filter(r => r.active).length;
      const atsCount = new Set(rows.map(r => r.ats).filter(Boolean)).size;
      return [
        { label: "Companies", value: rows.length },
        { label: "Active", value: active },
        { label: "Inactive", value: rows.length - active },
        { label: "ATS", value: atsCount },
      ];
    }
  }
];

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function showError(msg) {
  document.getElementById("errBox").innerHTML =
    '<div class="err"><strong>Could not load data.</strong><br>' + msg + '</div>';
}

function statCard(label, value) {
  return '<div class="stat-chip"><div class="n">' + Number(value).toLocaleString() + '</div><div class="l">' + esc(label) + '</div></div>';
}

async function renderSection(section) {
  const panel = document.createElement("div");
  panel.className = "stat-row";
  panel.innerHTML =
    '<div class="stat-row-info">' +
      '<h2><a href="' + esc(section.href) + '">' + esc(section.title) + '</a></h2>' +
      '<p class="hint">' + esc(section.desc) + '</p>' +
    '</div>' +
    '<div class="stat-row-stats stat-loading">Loading stats...</div>';
  document.getElementById("sections").appendChild(panel);

  const statsEl = panel.querySelector(".stat-row-stats");
  try {
    const stats = await section.load();
    statsEl.classList.remove("stat-loading");
    statsEl.textContent = "";
    statsEl.innerHTML = stats.map(s => statCard(s.label, s.value)).join("");
  } catch (err) {
    statsEl.textContent = "";
    showError((err && err.message) ? err.message : String(err));
  }
}

SECTIONS.forEach(renderSection);
</script>
</body>
</html>
