async function fetchAllRows(table, selectCols, applyFilters) {
  // Requested page size. Supabase caps rows-per-request server-side
  // (Project Settings > API > Max Rows, default 1000) and silently clamps
  // anything larger than that cap, so we detect the REAL per-request size
  // from what the first response actually contains rather than assuming
  // this number was honored. That keeps pagination correct whether or not
  // the server-side cap has been raised to match.
  const requestedPageSize = 10000;
  function buildQuery(withCount) {
    let q = supabaseClient.from(table).select(selectCols, withCount ? { count: "exact" } : undefined);
    if (applyFilters) q = applyFilters(q);
    return q;
  }

  // First page tells us the exact total row count and the real per-request
  // cap, so we know how many more pages exist and can fire them all in
  // parallel instead of paging one sequential round trip at a time.
  const first = await buildQuery(true).range(0, requestedPageSize - 1);
  if (first.error) throw first.error;
  let all = first.data || [];
  const total = first.count != null ? first.count : all.length;
  const actualPageSize = all.length > 0 ? all.length : requestedPageSize;

  if (all.length < total) {
    const requests = [];
    for (let from = all.length; from < total; from += actualPageSize) {
      requests.push(buildQuery(false).range(from, from + actualPageSize - 1));
    }
    const results = await Promise.all(requests);
    for (const r of results) {
      if (r.error) throw r.error;
      all = all.concat(r.data || []);
    }
  }
  return all;
}

// Display-time render: render to safe HTML, then drop a leading requisition-code
// block. Handles both real HTML (Greenhouse/Ashby now) and legacy plain text with
// newlines/bullets. General, not tied to current formats. Storage stays raw.
function renderDescription(html) {
  if (!html) return "";
  // decide whether this is real HTML or plain text (a bare "<500" is not a tag)
  const looksHtml = /<\/?(p|br|div|ul|ol|li|strong|b|em|i|span|h[1-6]|a|table|tr|td)\b/i.test(html);
  const safe = DOMPurify.sanitize(looksHtml ? html : plainTextToHtml(html),
    { USE_PROFILES: { html: true }, FORBID_ATTR: ["style"], FORBID_TAGS: ["font"] });
  return stripLeadingReqCode(safe);
}

// A requisition code is a short token of uppercase letters/digits/hyphens that
// contains at least one digit (e.g. FEQ227R42, CSQ327R31, SLSQ227R53, P-156).
function isReqCode(text) {
  const t = (text || "").trim();
  return t.length > 0 && t.length <= 16 && /^[A-Z][A-Z0-9-]*\d[A-Z0-9-]*$/.test(t);
}

// Remove the first block whose only content is a req code, wrapper and all, so no
// empty paragraph is left behind. Falls back to a text-level strip if there's no wrapper.
function stripLeadingReqCode(safeHtml) {
  const wrap = document.createElement("div");
  wrap.innerHTML = safeHtml;
  // skip empty leading nodes, then test the first element with text
  let node = wrap.firstChild;
  while (node && node.nodeType === 3 && !node.textContent.trim()) node = node.nextSibling;
  if (node && node.nodeType === 1 && isReqCode(node.textContent)) {
    node.remove();
    return wrap.innerHTML;
  }
  // no wrapper: code may be bare leading text inside the first element or root
  if (node && node.nodeType === 1) {
    node.innerHTML = node.innerHTML.replace(/^\s*[A-Z][A-Z0-9-]*\d[A-Z0-9-]*(?:&nbsp;|\s)+/, "");
  } else if (node && node.nodeType === 3) {
    node.textContent = node.textContent.replace(/^\s*[A-Z][A-Z0-9-]*\d[A-Z0-9-]*\s+/, "");
  }
  return wrap.innerHTML;
}

// Turn plain text into paragraphs and bullet lists. Double newlines split blocks,
// single newlines become line breaks, and lines starting with - / • / * become list items.
function plainTextToHtml(text) {
  const blocks = text.split(/\n{2,}/).map(b => b.trim()).filter(Boolean);
  let html = "", inList = false;
  for (const b of blocks) {
    if (/^[-•*]\s+/.test(b)) {
      if (!inList) { html += "<ul>"; inList = true; }
      html += "<li>" + esc(b.replace(/^[-•*]\s+/, "")).replace(/\n/g, "<br>") + "</li>";
    } else {
      if (inList) { html += "</ul>"; inList = false; }
      html += "<p>" + esc(b).replace(/\n/g, "<br>") + "</p>";
    }
  }
  if (inList) html += "</ul>";
  return html;
}

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toISOString().slice(0, 10);
}

const MONTH_NAMES = ["January","February","March","April","May","June",
  "July","August","September","October","November","December"];
// Parses a "YYYY-MM-DD" date string directly (no Date object) so the
// displayed day can't shift due to local-timezone conversion.
function fmtDateLong(d) {
  if (!d) return "";
  const [y, m, day] = String(d).slice(0, 10).split("-").map(Number);
  if (!y || !m || !day) return d;
  return MONTH_NAMES[m - 1] + " " + day + ", " + y;
}

// "today" / "1 day ago" / "N days ago", comparing the snapshot date against
// the viewer's local calendar date (not the server's or UTC's).
function daysAgoLabel(d) {
  if (!d) return "";
  const [y, m, day] = String(d).slice(0, 10).split("-").map(Number);
  if (!y || !m || !day) return "";
  const snapshotUTC = Date.UTC(y, m - 1, day);
  const now = new Date();
  const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.round((todayUTC - snapshotUTC) / 86400000);
  if (diff <= 0) return "today";
  return diff + (diff === 1 ? " day ago" : " days ago");
}

// Days since posted_at (the source's claim). Returns null when posted_at is absent or unparseable.
function daysOld(posted) {
  if (!posted) return null;
  const d = new Date(posted);
  if (isNaN(d)) return null;
  const ms = Date.now() - d.getTime();
  if (ms < 0) return 0;
  return Math.floor(ms / 86400000);
}

// Sort/display key when posted_at is missing (e.g. Google's scraper never gets
// a posted date from the source site). Falls back to first_seen, the date our
// own pipeline first observed the job — an honest "discovered" signal, not a
// substitute posted date. Returns {days, estimated} or null if neither exists.
function effectiveAge(r) {
  const real = daysOld(r.posted_at);
  if (real != null) return { days: real, estimated: false };
  const fallback = daysOld(r.first_seen);
  if (fallback != null) return { days: fallback, estimated: true };
  return null;
}

function fmtSalary(r) {
  if (r.salary_min == null && r.salary_max == null) return "";
  const cur = r.salary_currency || "";
  const n = (v) => v == null ? "" : Number(v).toLocaleString();
  if (r.salary_min != null && r.salary_max != null) return cur + " " + n(r.salary_min) + " to " + n(r.salary_max);
  return cur + " " + n(r.salary_min != null ? r.salary_min : r.salary_max);
}

// ---- Data load ----
async function init() {
  try {
    const { data: latest, error: e1 } = await supabaseClient.from("jobs_location_flags").select("snapshot_date")
      .order("snapshot_date", { ascending: false }).limit(1);
    if (e1) throw e1;
    if (!latest || !latest.length) { showError("No rows found in jobs_location_flags."); return; }
    state.snapshotDate = latest[0].snapshot_date;

    // Quick first paint: pull just enough rows (in the same newest-first order
    // renderTable defaults to) to fill the first page, so the table shows
    // something in one small round trip instead of waiting on the full,
    // multi-thousand-row fetch below. Filters/counts/other pages aren't
    // reliable until the full set lands, so we flag that with fullyLoaded.
    const quick = await supabaseClient.from("jobs_location_flags").select(LIST_COLUMNS)
      .eq("snapshot_date", state.snapshotDate)
      .or("maybe_wa.not.is.false,maybe_remote_wa.not.is.false")
      .order("posted_at", { ascending: false, nullsFirst: false })
      .order("first_seen", { ascending: false, nullsFirst: false })
      .limit(state.pageSize);
    if (quick.error) throw quick.error;
    state.rows = quick.data || [];
    state.fullyLoaded = false;
    document.getElementById("loading").style.display = "none";
    render();

    // Full set for the latest snapshot, loaded in the background so filters,
    // the company/classifier dropdowns, and pagination beyond page 1 become
    // accurate a moment later without blocking the initial paint above.
    state.rows = await fetchAllRows("jobs_location_flags", LIST_COLUMNS, (q) =>
      q.eq("snapshot_date", state.snapshotDate)
       .or("maybe_wa.not.is.false,maybe_remote_wa.not.is.false")
       .order("watchlist_company", { ascending: true }).order("title", { ascending: true })
    );
    state.fullyLoaded = true;
    render();
  } catch (err) {
    document.getElementById("loading").style.display = "none";
    showError((err && err.message) ? err.message : String(err));
    console.error(err);
  }
}

// Shared wiring for a checkbox-dropdown filter (button toggle, clear-all,
// per-checkbox state.filters[filterKey] tracking, reset/sync for external
// callers like the preset button). optionsHtml is the pre-built list of
// <label><input type=checkbox>...</label> options for the panel.
function buildCheckboxDropdown(containerId, filterKey, allLabel, optionsHtml) {
  const container = document.getElementById(containerId);
  container.innerHTML =
    '<button type="button" class="msdd-btn"></button>' +
    '<div class="msdd-panel" hidden>' +
      '<button type="button" class="msdd-clear">Clear all</button>' +
      optionsHtml +
    '</div>';
  const btn = container.querySelector(".msdd-btn");
  const panel = container.querySelector(".msdd-panel");
  const clearAllBtn = container.querySelector(".msdd-clear");
  const shortLabel = allLabel.replace(/^All /, "");

  function updateLabel() {
    const n = state.filters[filterKey].length;
    btn.textContent = (n === 0 ? allLabel : shortLabel + " (" + n + ")") + " \u25be";
    btn.classList.toggle("active", n > 0);
  }
  updateLabel();

  btn.onclick = (e) => {
    e.stopPropagation();
    document.querySelectorAll(".msdd-panel").forEach(p => { if (p !== panel) p.hidden = true; });
    panel.hidden = !panel.hidden;
  };
  panel.onclick = (e) => e.stopPropagation();
  clearAllBtn.onclick = () => {
    state.filters[filterKey] = [];
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; });
    state.page = 1;
    updateLabel();
    renderTable();
  };
  panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.onchange = () => {
      const arr = state.filters[filterKey];
      const i = arr.indexOf(cb.value);
      if (cb.checked && i < 0) arr.push(cb.value);
      if (!cb.checked && i >= 0) arr.splice(i, 1);
      state.page = 1;
      updateLabel();
      renderTable();
    };
  });
  container._reset = () => {
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; });
    updateLabel();
  };
  // Re-check boxes to match state.filters[filterKey] (e.g. after a preset applies filters programmatically).
  container._sync = () => {
    panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.checked = state.filters[filterKey].includes(cb.value);
    });
    updateLabel();
  };
  container._sync();
}

// dataField = row property, filterKey = state.filters key. Options are the
// distinct non-null values actually present in state.rows.
function buildMultiSelect(containerId, dataField, filterKey, allLabel) {
  const values = Array.from(new Set(state.rows.map(r => r[dataField]).filter(v => v != null && v !== ""))).sort();
  const hasNull = state.rows.some(r => r[dataField] == null || r[dataField] === "");
  const optionsHtml =
    values.map(v => '<label class="msdd-opt"><input type="checkbox" value="' + esc(v) + '"> ' + esc(v) + '</label>').join("") +
    (hasNull ? '<label class="msdd-opt"><input type="checkbox" value="' + UNCLASSIFIED + '"> (unclassified)</label>' : "");
  buildCheckboxDropdown(containerId, filterKey, allLabel, optionsHtml);
}

// Fixed bucket list from DAYS_OLD_OPTIONS (not derived from data), plus an
// "(unclassified)" option when some row has no effective age.
function buildDaysOldSelect(containerId, filterKey, allLabel) {
  const hasNull = state.rows.some(r => !effectiveAge(r));
  const optionsHtml =
    DAYS_OLD_OPTIONS.map(o => '<label class="msdd-opt"><input type="checkbox" value="' + o.value + '"> ' + esc(o.label) + '</label>').join("") +
    (hasNull ? '<label class="msdd-opt"><input type="checkbox" value="' + UNCLASSIFIED + '"> (unclassified)</label>' : "");
  buildCheckboxDropdown(containerId, filterKey, allLabel, optionsHtml);
}

function classifierMatch(selected, value) {
  if (!selected || selected.length === 0) return true;
  const isNull = (value == null || value === "");
  return selected.some(sel => sel === UNCLASSIFIED ? isNull : sel === value);
}

// Row matches if ANY selected bucket's test() covers its effective age.
function daysOldMatch(selected, r) {
  if (!selected || selected.length === 0) return true;
  const age = effectiveAge(r);
  const n = age ? age.days : null;
  return selected.some(v => {
    if (v === UNCLASSIFIED) return n == null;
    if (n == null) return false;
    const opt = DAYS_OLD_OPTIONS.find(o => o.value === v);
    return opt ? opt.test(n) : false;
  });
}

function applyFilters() {
  const f = state.filters;
  const q = f.search.trim().toLowerCase();
  return state.rows.filter(r => {
    if (f.company && r.watchlist_company !== f.company) return false;
    if (!classifierMatch(f.discipline, r.discipline)) return false;
    if (!classifierMatch(f.role, r.role_keyword)) return false;
    if (!classifierMatch(f.level, r.level)) return false;
    if (!daysOldMatch(f.daysOld, r)) return false;
    if (f.wa || f.remote) {
      const ok = (f.wa && r.maybe_wa) || (f.remote && r.maybe_remote_wa);
      if (!ok) return false;
    }
    if (q) {
      const hay = ((r.title || "") + " " + (r.watchlist_company || "") + " " + (r.location || "") + " " + (r.department || "")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderTable() {
  const filtered = applyFilters();
  filtered.sort((a, b) => {
    const ea = effectiveAge(a), eb = effectiveAge(b);
    if (!ea && !eb) return 0;
    if (!ea) return 1;
    if (!eb) return -1;
    return ea.days - eb.days;
  });
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / state.pageSize));
  if (state.page > pages) state.page = pages;
  const start = (state.page - 1) * state.pageSize;
  const slice = filtered.slice(start, start + state.pageSize);

  document.getElementById("count").textContent =
    total.toLocaleString() + " role" + (total === 1 ? "" : "s") + " matched" +
    (total ? (" (showing " + (start + 1) + " to " + Math.min(start + state.pageSize, total) + ")") : "");

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  slice.forEach(r => {
    const key = r.watchlist_company + "::" + r.ats_id;
    const link = r.apply_url || r.url;
    const badges =
      (r.maybe_wa ? '<span class="badge wa">WA</span>' : "") +
      (r.maybe_remote_wa ? '<span class="badge rem">Remote</span>' : "");
    const age = effectiveAge(r);
    const daysCell = !age ? "-" : (age.estimated ? age.days + "*" : age.days);
    const daysTitle = age && age.estimated ? "posted_at unavailable for this source; estimated from first_seen" : "";
    const tr = document.createElement("tr");
    tr.className = "jobrow";
    tr.innerHTML =
      '<td class="company">' + esc(r.display_name || r.watchlist_company) + '</td>' +
      '<td title="' + esc(r.title || "") + '">' + esc(r.title || "(no title)") + badges + '</td>' +
      '<td class="loc" title="' + esc(r.department || "") + '">' + esc(r.department || "") + '</td>' +
      '<td class="loc" title="' + esc(daysTitle) + '">' + daysCell + '</td>' +
      '<td>' + (link ? '<a href="' + esc(link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">view</a>' : "") + '</td>';
    tr.onclick = () => toggleRow(key, r, tr);
    tbody.appendChild(tr);

    if (state.expanded === key) {
      appendDetail(tbody, key, r);
    }
  });

  renderPager(total, pages);
}

function goToPage(n, pages) {
  if (isNaN(n)) return;
  state.page = Math.min(Math.max(1, Math.floor(n)), pages);
  renderTable();
}

function renderPager(total, pages) {
  const p = document.getElementById("pager");
  p.innerHTML = "";
  if (total === 0) return;

  function btn(text, disabled, onclick) {
    const b = document.createElement("button");
    b.textContent = text; b.disabled = disabled; b.onclick = onclick;
    return b;
  }

  const first = btn("First", state.page <= 1, () => goToPage(1, pages));
  const prev = btn("Prev", state.page <= 1, () => goToPage(state.page - 1, pages));
  const next = btn("Next", state.page >= pages, () => goToPage(state.page + 1, pages));
  const last = btn("Last", state.page >= pages, () => goToPage(pages, pages));

  const jump = document.createElement("span");
  jump.className = "jump";
  jump.appendChild(document.createTextNode("Page "));
  const input = document.createElement("input");
  input.type = "number"; input.min = 1; input.max = pages; input.value = state.page;
  input.onchange = () => goToPage(Number(input.value), pages);
  input.onkeydown = (e) => { if (e.key === "Enter") goToPage(Number(input.value), pages); };
  jump.appendChild(input);
  jump.appendChild(document.createTextNode(" of " + pages));

  p.appendChild(first);
  p.appendChild(prev);
  p.appendChild(jump);
  p.appendChild(next);
  p.appendChild(last);
}

function toggleRow(key, r, tr) {
  state.expanded = (state.expanded === key) ? null : key;
  renderTable();
}

async function appendDetail(tbody, key, r) {
  const tr = document.createElement("tr");
  tr.className = "detail";
  const td = document.createElement("td");
  td.colSpan = 5;

  const dept = r.department ? esc(r.department) : "TBD";
  const posted = r.posted_at ? fmtDate(r.posted_at) : "TBD";
  const lastSeen = fmtDate(r.snapshot_date);
  const ats = r.ats_type ? esc(r.ats_type) : "TBD";
  const atsId = esc(r.ats_id || "");

  const disc = r.discipline ? esc(r.discipline) : "-";
  const roleKw = r.role_keyword ? esc(r.role_keyword) : "-";
  const lvl = r.level ? esc(r.level) : "-";

  const meta =
    '<div class="metaline"><span class="lbl">Job Info:</span> Dept: ' + dept +
      ' | Location: <span class="locval">Loading...</span></div>' +
    '<div class="metaline"><span class="lbl">Classification:</span> Discipline: ' + disc +
      ' | Role: ' + roleKw +
      ' | Level: ' + lvl + '</div>' +
    '<div class="metaline"><span class="lbl">Dates:</span> First Posted (ATS.ID): ' + posted +
      ' | Last Seen: ' + lastSeen + '</div>' +
    '<div class="metaline"><span class="lbl">ATS:</span> ' + ats +
      ' | ATS Job ID: ' + atsId + '</div>';

  td.innerHTML = '<div class="meta">' + meta + '</div><div class="desc" id="desc_' + cssId(key) + '">Loading description...</div>';
  tr.appendChild(td);
  tbody.appendChild(tr);

  const target = td.querySelector(".desc");
  const locTarget = td.querySelector(".locval");
  try {
    let cached = state.descCache[key];
    if (cached === undefined) {
      const { data, error } = await supabaseClient
        .from("job_content").select("description, location")
        .eq("watchlist_company", r.watchlist_company).eq("ats_id", r.ats_id).limit(1);
      if (error) throw error;
      cached = (data && data.length) ? { description: data[0].description, location: data[0].location } : { description: null, location: null };
      state.descCache[key] = cached;
    }
    if (locTarget) locTarget.textContent = cached.location || "TBD";
    if (cached.description) { target.innerHTML = renderDescription(cached.description); }
    else { target.textContent = "No description stored for this role."; }
  } catch (err) {
    if (locTarget) locTarget.textContent = "TBD";
    target.textContent = "Could not load description: " + ((err && err.message) ? err.message : String(err));
  }
}

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function cssId(s) { return s.replace(/[^a-z0-9]/gi, "_"); }

function wireControls() {
  const search = document.getElementById("search");
  search.oninput = () => { state.filters.search = search.value; state.page = 1; renderTable(); };
  const sel = document.getElementById("companySel");
  sel.onchange = () => { state.filters.company = sel.value; state.page = 1; renderTable(); };
  document.getElementById("presetBtn").onclick = () => {
    state.filters.discipline = PRESET_FILTERS.discipline.slice();
    state.filters.role = PRESET_FILTERS.role.slice();
    state.filters.level = PRESET_FILTERS.level.slice();
    state.page = 1;
    ["disciplineDD", "roleDD", "levelDD"].forEach(id => { const c = document.getElementById(id); if (c && c._sync) c._sync(); });
    renderTable();
  };
  document.getElementById("waChk").onchange = (e) => { state.filters.wa = e.target.checked; state.page = 1; renderTable(); };
  document.getElementById("remChk").onchange = (e) => { state.filters.remote = e.target.checked; state.page = 1; renderTable(); };
  document.getElementById("clearBtn").onclick = () => {
    state.filters = { company: "", wa: false, remote: false, search: "", discipline: [], role: [], level: [], daysOld: [] };
    state.page = 1;
    search.value = ""; sel.value = "";
    document.getElementById("waChk").checked = false;
    document.getElementById("remChk").checked = false;
    ["disciplineDD", "roleDD", "levelDD", "daysOldDD"].forEach(id => { const c = document.getElementById(id); if (c && c._reset) c._reset(); });
    renderTable();
  };
  // close any open dropdown when clicking elsewhere
  document.addEventListener("click", () => {
    document.querySelectorAll(".msdd-panel").forEach(p => { p.hidden = true; });
  });
}

init();
</script>
