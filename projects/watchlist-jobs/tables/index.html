<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Stats</title>
<link rel="stylesheet" href="/styles.css">
<script defer src="/site.js"></script>
</head>
<body>
<div id="siteNav"></div>
<div class="wrap">
  <h1>Table Stats</h1>
  <div class="sub">Nightly storage and shape monitoring for the watchlist-jobs tables &mdash; rows, size, and column-level breadth, captured once a day rather than computed live.</div>

  <div id="errBox"></div>

  <div id="sections"></div>

  <footer class="site-footer">
    <p>© 2026 Victor Heymeyer | Seattle, WA |<a href="https://www.linkedin.com/in/heymeyer/" target="_blank" rel="noopener noreferrer"> LinkedIn</a> </p>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ---- Config ----
const SUPABASE_URL = "https://gfwzdluwljtcbvmmkktd.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdmd3pkbHV3bGp0Y2J2bW1ra3RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2ODA2MjcsImV4cCI6MjA5ODI1NjYyN30.bGjryWzUobX--FFFmBPlEorY8Tb9qpm_aGDEW0ApBps";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, ANON_KEY);

// One entry per templated table page. Add a new entry when the template is
// applied to another table; the section renders itself from table_stats.
const TABLES = [
  {
    title: "job_content",
    href: "job_content.html",
    desc: "Per-job dimension table, upserted on (watchlist_company, ats_id). description/raw are retained only for Seattle-relevant postings."
  },
  {
    title: "raw_watchlist_jobs",
    href: "raw_watchlist_jobs.html",
    desc: "Immutable daily snapshot fact table, pruned to 14 days of retention."
  },
  {
    title: "watchlist_companies",
    href: "watchlist_companies.html",
    desc: "Hand-curated list of companies scraped daily; edited directly, not scraped."
  },
  {
    title: "ats_company_directory",
    href: "ats_company_directory.html",
    desc: "Candidate-company directory across ATS platforms, rebuilt in one pass monthly."
  }
];

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function showError(msg) {
  document.getElementById("errBox").innerHTML =
    '<div class="err"><strong>Could not load data.</strong><br>' + msg + '</div>';
}

function fmtBytes(n) {
  if (n == null) return "-";
  const units = ["bytes", "kB", "MB", "GB", "TB"];
  let v = Number(n), i = 0;
  while (Math.abs(v) >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return (i === 0 ? v : v.toFixed(1)) + " " + units[i];
}

function fmtDateTime(ts) {
  if (!ts) return "";
  const dt = new Date(ts);
  if (isNaN(dt)) return ts;
  return dt.toLocaleString();
}

function statChip(label, value) {
  return '<div class="stat-chip"><div class="n">' + esc(value) + '</div><div class="l">' + esc(label) + '</div></div>';
}

async function loadStats(tableName) {
  const { data, error } = await supabaseClient
    .from("table_stats").select("captured_date,row_count,total_bytes,captured_at")
    .eq("table_name", tableName)
    .order("captured_date", { ascending: false })
    .limit(2);
  if (error) throw error;
  const rows = data || [];
  if (!rows.length) return [{ label: "Status", value: "No captures yet" }];

  const latest = rows[0];
  const stats = [
    { label: "Rows", value: latest.row_count.toLocaleString() },
    { label: "Total size", value: fmtBytes(latest.total_bytes) }
  ];

  if (rows.length > 1) {
    const prev = rows[1];
    const days = Math.max(1, Math.round((new Date(latest.captured_date) - new Date(prev.captured_date)) / 86400000));
    const perDay = Math.round((latest.row_count - prev.row_count) / days);
    stats.push({ label: "Rows/day", value: (perDay > 0 ? "+" : "") + perDay.toLocaleString() });
  }

  stats.push({ label: "Last captured", value: fmtDateTime(latest.captured_at) });
  return stats;
}

async function renderTable(table) {
  const panel = document.createElement("div");
  panel.className = "stat-row";
  panel.innerHTML =
    '<div class="stat-row-info">' +
      '<h2><a href="' + esc(table.href) + '">' + esc(table.title) + '</a></h2>' +
      '<p class="hint">' + esc(table.desc) + '</p>' +
    '</div>' +
    '<div class="stat-row-stats stat-loading">Loading stats...</div>';
  document.getElementById("sections").appendChild(panel);

  const statsEl = panel.querySelector(".stat-row-stats");
  try {
    const stats = await loadStats(table.title);
    statsEl.classList.remove("stat-loading");
    statsEl.textContent = "";
    statsEl.innerHTML = stats.map(s => statChip(s.label, s.value)).join("");
  } catch (err) {
    statsEl.textContent = "";
    showError((err && err.message) ? err.message : String(err));
  }
}

TABLES.forEach(renderTable);
</script>
</body>
</html>
