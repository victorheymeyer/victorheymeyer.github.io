<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physical Projects - Victor Heymeyer</title>
  <meta name="description" content="Hands-on projects by Victor Heymeyer: custom furniture, tile work, and outdoor builds." />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="wrap physical-page">
    <a class="back-link" href="../">&larr; Back to home</a>
    <h1>Physical Projects</h1>
    <p class="sub">Hands-on projects: custom furniture and 1920s Craftsman renovations</p>

    <nav class="subnav">
      <a href="#custom-furniture">Custom Furniture</a>
      <a href="#tile-work">Tile Work</a>
      <a href="#outdoor">Outdoor</a>
      <a href="#workshop">Workshop</a>
    </nav>

    <section id="custom-furniture" class="panel">
      <h2>Custom Furniture</h2>
      <div class="gallery-grid">
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/custom-furniture/first-project-bench.jpg" alt="First project - bench"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>First Project &mdash; Bench</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/custom-furniture/toughest-project-bed.jpg" alt="Toughest project - bed"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Toughest Project &mdash; Bed</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/custom-furniture/favorite-project-tv-wall-unit.jpg" alt="Favorite project - TV wall unit"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Favorite Project &mdash; TV Wall Unit</figcaption>
        </figure>
      </div>
    </section>

    <section id="tile-work" class="panel">
      <h2>Tile Work</h2>
      <div class="gallery-grid">
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/tile-work/first-tile-project-laundry-room.jpg" alt="First tile project - laundry room"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>First Tile Project &mdash; Laundry Room</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/tile-work/largest-tile-project-basement-brick-wall.jpg" alt="Largest tile project - basement brick wall"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Largest Tile Project &mdash; Basement Brick Wall</figcaption>
        </figure>
      </div>
    </section>

    <section id="outdoor" class="panel">
      <h2>Outdoor</h2>
      <div class="gallery-grid">
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/outdoor/storage-console.jpg" alt="Storage console"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Storage / Console</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/outdoor/stone-walkway-1.jpg" alt="Stone walkway, photo 1"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Stone Walkway</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/outdoor/stone-walkway-2.jpg" alt="Stone walkway, photo 2"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Stone Walkway</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/outdoor/bike-storage-1.jpg" alt="Bike storage, photo 1"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Bike Storage</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/outdoor/bike-storage-2.jpg" alt="Bike storage, photo 2"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Bike Storage</figcaption>
        </figure>
        <!-- Bike Storage count is TBD (2-4 photos). To add more, copy one of the
             two Bike Storage <figure> blocks above, bump the filename to
             bike-storage-3.jpg / bike-storage-4.jpg, and drop the matching
             image into images/outdoor/. -->
      </div>
    </section>

    <section id="workshop" class="panel">
      <h2>Workshop</h2>
      <div class="gallery-grid">
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/workshop/workshop-1.jpg" alt="Workshop, photo 1"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Workshop</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/workshop/workshop-2.jpg" alt="Workshop, photo 2"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Workshop</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/workshop/workshop-3.jpg" alt="Workshop, photo 3"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Workshop</figcaption>
        </figure>
        <figure class="photo-card">
          <div class="photo-frame">
            <img src="images/workshop/workshop-4.jpg" alt="Workshop, photo 4"
                 onerror="this.parentElement.classList.add('empty'); this.remove();" />
          </div>
          <figcaption>Workshop</figcaption>
        </figure>
      </div>
    </section>
  </div>
</body>
</html>
